<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日語學習 App</title>
    <style>
        body { font-family: sans-serif; background: #fff5f7; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #d63384; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .tabs { display: flex; background: #ffe4e6; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #d63384; font-weight: bold; }
        .tab.active { background: #d63384; color: white; }
        .content { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .content.active { display: block; }
        .list-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .quiz-card { background: white; padding: 20px; border-radius: 20px; text-align: center; margin: 10px auto; max-width: 400px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: 1px solid #fbcfe8; background: white; border-radius: 10px; color: #d63384; font-weight: bold; }
        .next-btn { background: #d63384; color: white; width: 100%; margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div class="header">日語單字王</div>
    <div class="tabs">
        <div id="t1" class="tab active" onclick="sw('l')">📖 預覽全部</div>
        <div id="t2" class="tab" onclick="sw('q')">📝 開始測驗</div>
    </div>
    <div id="c1" class="content active"></div>
    <div id="c2" class="content">
        <div class="quiz-card">
            <div id="q" style="font-size:2rem; font-weight:bold;">載入中...</div>
            <div id="opts" class="options"></div>
            <div id="res" style="margin-top:15px; font-weight:bold;"></div>
            <button id="nxt" class="next-btn" onclick="nextQ()">下一題</button>
        </div>
    </div>
    <script>
        const data = [
            {j:"いえ",z:"家"},{j:"えき",z:"車站"},{j:"かき",z:"柿子"},{j:"あき",z:"秋天"},
            {j:"うえ",z:"上面"},{j:"かお",z:"臉"},{j:"なし",z:"梨子"},{j:"さかな",z:"魚"},
            {j:"いぬ",z:"狗"},{j:"ねこ",z:"貓"},{j:"はな",z:"花"}
        ];
        const l = document.getElementById('c1');
        data.forEach(i => {
            const d = document.createElement('div'); d.className='list-card';
            d.innerHTML = `<b>${i.j}</b><span>${i.z}</span>`; l.appendChild(d);
        });
        function sw(m){
            document.getElementById('t1').className = m=='l'?'tab active':'tab';
            document.getElementById('t2').className = m=='q'?'tab active':'tab';
            document.getElementById('c1').className = m=='l'?'content active':'content';
            document.getElementById('c2').className = m=='q'?'content active':'content';
            if(m=='q') nextQ();
        }
        let cur = 0;
        function nextQ(){
            const i = data[Math.floor(Math.random()*data.length)];
            document.getElementById('q').innerText = i.j;
            const b = document.getElementById('opts'); b.innerHTML = "";
            document.getElementById('res').innerText = "";
            document.getElementById('nxt').style.display = "none";
            let c = [i.z]; while(c.length<4){
                let r = data[Math.floor(Math.random()*data.length)].z;
                if(!c.includes(r)) c.push(r);
            }
            c.sort(()=>Math.random()-0.5).forEach(o => {
                const btn = document.createElement('button'); btn.innerText = o;
                btn.onclick = () => {
                    const r = document.getElementById('res');
                    if(o==i.z){ r.innerText="⭕ 正確"; r.style.color="green"; }
                    else { r.innerText="❌ 答案是："+i.z; r.style.color="red"; }
                    document.getElementById('nxt').style.display = "block";
                };
                b.appendChild(btn);
            });
        }
    </script>
</body>
</html>
