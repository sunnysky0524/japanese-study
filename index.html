<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>會說話的日語單字王</title>
    <style>
        body { font-family: sans-serif; background: #fff5f7; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #d63384; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .tabs { display: flex; background: #ffe4e6; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #d63384; font-weight: bold; }
        .tab.active { background: #d63384; color: white; }
        .content { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .content.active { display: block; }
        .list-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .speaker-icon { font-size: 1.2rem; margin-right: 10px; cursor: pointer; }
        .quiz-card { background: white; padding: 20px; border-radius: 20px; text-align: center; margin: 10px auto; max-width: 400px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: 1px solid #fbcfe8; background: white; border-radius: 10px; color: #d63384; font-weight: bold; }
        .next-btn { background: #d63384; color: white; width: 100%; margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div class="header">日語朗讀學習器</div>
    <div class="tabs">
        <div id="t1" class="tab active" onclick="sw('l')">📖 預覽與朗讀</div>
        <div id="t2" class="tab" onclick="sw('q')">📝 聽音測驗</div>
    </div>
    <div id="c1" class="content active"></div>
    <div id="c2" class="content">
        <div class="quiz-card">
            <div id="q" style="font-size:2rem; font-weight:bold; cursor:pointer;" onclick="speak(document.getElementById('q').innerText)">🔊 點我發音</div>
            <div id="opts" class="options"></div>
            <div id="res" style="margin-top:15px; font-weight:bold;"></div>
            <button id="nxt" class="next-btn" onclick="nextQ()">下一題</button>
        </div>
    </div>
    <script>
        const data = [
            {j:"いえ",z:"家"},{j:"えき",z:"車站"},{j:"かき",z:"柿子"},{j:"あき",z:"秋天"},
            {j:"うえ",z:"上面"},{j:"かお",z:"臉"},{j:"なし",z:"梨子"},{j:"さかな",z:"魚"},
            {j:"いぬ",z:"狗"},{j:"ねこ",z:"貓"},{j:"はな",z:"花"},{j:"スマホ",z:"手機"},
            {j:"コンビニ",z:"便利商店"},{j:"トイレ",z:"洗手間"}
        ];

        // 朗讀功能
        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ja-JP'; // 設定為日語
            utter.rate = 0.8;    // 語速慢一點，比較好學
            synth.speak(utter);
        }

        const listDiv = document.getElementById('c1');
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'list-card';
            div.onclick = () => speak(item.j);
            div.innerHTML = `<div><span class="speaker-icon">🔊</span><b>${item.j}</b></div><span>${item.z}</span>`;
            listDiv.appendChild(div);
        });

        function sw(m){
            document.getElementById('t1').className = m=='l'?'tab active':'tab';
            document.getElementById('t2').className = m=='q'?'tab active':'tab';
            document.getElementById('c1').className = m=='l'?'content active':'content';
            document.getElementById('c2').className = m=='q'?'content active':'content';
            if(m=='q') nextQ();
        }

        function nextQ(){
            const item = data[Math.floor(Math.random()*data.length)];
            document.getElementById('q').innerText = item.j;
            speak(item.j); // 出題時自動發音
            const optsBox = document.getElementById('opts'); optsBox.innerHTML = "";
            document.getElementById('res').innerText = "";
            document.getElementById('nxt').style.display = "none";
            let choices = [item.z];
            while(choices.length < 4) {
                let r = data[Math.floor(Math.random()*data.length)].z;
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(()=>Math.random()-0.5).forEach(o => {
                const btn = document.createElement('button'); btn.innerText = o;
                btn.onclick = () => {
                    const res = document.getElementById('result');
                    if(o==item.z){ 
                        document.getElementById('res').innerText="⭕ 正確"; 
                        document.getElementById('res').style.color="green"; 
                    } else { 
                        document.getElementById('res').innerText="❌ 答案是："+item.z; 
                        document.getElementById('res').style.color="red"; 
                    }
                    document.getElementById('nxt').style.display = "block";
                };
                optsBox.appendChild(btn);
            });
        }
    </script>
</body>
</html>
