  kana:"50音",
  dakuon:"濁音",
  handakuon:"半濁音",
  youon:"拗音",
  words:"單字",
  places:"地名",
  sentences:"句子",
  dialog:"對話"
};

// ===== 發音 =====
function speak(text){
  let u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ===== 預覽 =====
let pNow="words";

function renderPreview(){
  let box=document.getElementById('pBox');
  box.innerHTML='';
  DATA[pNow].forEach(i=>{
    let d=document.createElement('div');
    d.className='card';
    d.innerHTML=`
      <div class="jp">${i.j}</div>
      <div class="zh">${i.z}</div>
      ${i.k ? `<div class="kana">50音：${i.k}</div>` : ''}
      <button class="speak">🔊 播放</button>`;
    d.querySelector('.speak').onclick=()=>speak(i.j);
    box.appendChild(d);
  });
}

function renderPChips(){
  let box=document.getElementById('pChips');
  box.innerHTML='';
  Object.keys(DATA).forEach(k=>{
    let b=document.createElement('button');
    b.className='chip'+(pNow===k?' active':'');
    b.innerText=CAT[k];
    b.onclick=()=>{
      pNow=k;
      renderPChips();
      renderPreview();
    };
    box.appendChild(b);
  });
}

// ===== 測驗 =====
let qNow="words",cur;

function nextQ(){
  let pool=DATA[qNow];
  cur=pool[Math.floor(Math.random()*pool.length)];

  document.getElementById('qbox').innerHTML=`
    <div class="jp">${cur.j}</div>
    ${cur.k ? `<div class="kana">50音：${cur.k}</div>` : ''}
    <button class="speak">🔊 播放</button>`;
  document.querySelector('#qbox .speak').onclick=()=>speak(cur.j);

  let opts=[cur.z];
  while(opts.length<4){
    let r=pool[Math.floor(Math.random()*pool.length)].z;
    if(!opts.includes(r)) opts.push(r);
  }

  let box=document.getElementById('opts');
  box.innerHTML='';
  document.getElementById('res').innerHTML='';
  opts.sort(()=>Math.random()-0.5);

  opts.forEach(o=>{
    let b=document.createElement('button');
    b.className='option';
    b.innerText=o;
    b.onclick=()=>{
      document.querySelectorAll('.option').forEach(btn=>btn.disabled=true);
      if(o===cur.z){
        b.classList.add('correct');
        document.getElementById('res').innerHTML="⭕ 正確";
      }else{
        b.classList.add('wrong');
        document.getElementById('res').innerHTML="❌ 正解："+cur.z;
      }
    };
    box.appendChild(b);
  });
}

function renderQChips(){
  let box=document.getElementById('qChips');
  box.innerHTML='';
  Object.keys(DATA).forEach(k=>{
    let b=document.createElement('button');
    b.className='chip'+(qNow===k?' active':'');
    b.innerText=CAT[k];
    b.onclick=()=>{
      qNow=k;
      renderQChips();
      document.getElementById('qbox').innerHTML=`<div class="jp">目前題庫：${CAT[k]}</div>`;
      document.getElementById('opts').innerHTML='';
      document.getElementById('res').innerHTML='';
    };
    box.appendChild(b);
  });
}

// ===== 切換 =====
function tab(e,t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('p').classList.toggle('hidden',t!=='p');
  document.getElementById('q').classList.toggle('hidden',t!=='q');
}

// 初始化
renderPChips();
renderPreview();
renderQChips();
document.getElementById('qbox').innerHTML='<div class="jp">請選題庫後開始測驗</div>';
</script>
