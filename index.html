<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日語學習 App</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff5f7; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #d63384; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .tabs { display: flex; background: #ffe4e6; padding: 5px; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #d63384; font-weight: bold; border-radius: 10px; }
        .tab.active { background: #d63384; color: white; }
        .content { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .content.active { display: block; }
        .list-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #d63384; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .list-jp { font-size: 1.2rem; font-weight: bold; color: #333; }
        .list-zh { color: #d63384; font-weight: 500; }
        .quiz-card { background: white; padding: 30px 20px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; margin: 10px auto; max-width: 400px; }
        .question { font-size: 2rem; font-weight: bold; margin-bottom: 30px; color: #333; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        button.opt-btn { padding: 18px 10px; font-size: 1.1rem; border: 2px solid #fbcfe8; background: white; border-radius: 15px; color: #d63384; font-weight: 600; }
        button.next-btn { background: #d63384; color: white; border: none; width: 100%; margin-top: 25px; padding: 18px; border-radius: 15px; font-size: 1.2rem; display: none; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.3rem; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="header">日語基礎學習</div>
    <div class="tabs">
        <div id="tab-learn" class="tab active" onclick="switchTab('learn')">📖 預覽全部</div>
        <div id="tab-quiz" class="tab" onclick="switchTab('quiz')">📝 開始測驗</div>
    </div>
    <div id="learn-content" class="content active"></div>
    <div id="quiz-content" class="content">
        <div class="quiz-card">
            <div id="q-text" class="question">載入中...</div>
            <div id="options-box" class="options"></div>
            <div id="result"></div>
            <button id="next-btn" class="next-btn" onclick="renderQuestion()">下一題 ❯</button>
        </div>
    </div>
    <script>
        const wordData = [
            { j: "いえ", z: "家" }, { j: "えき", z: "車站" }, { j: "かき", z: "柿子" },
            { j: "きく", z: "菊花" }, { j: "いけ", z: "池塘" }, { j: "こい", z: "鯉魚" },
            { j: "あき", z: "秋天" }, { j: "うえ", z: "上面" }, { j: "かお", z: "臉" },
            { j: "なし", z: "梨子" }, { j: "さかな", z: "魚" }, { j: "いぬ", z: "狗" },
            { j: "ねこ", z: "貓" }, { j: "はな", z: "花" }
        ];
        const learnDiv = document.getElementById('learn-content');
        wordData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'list-card';
            card.innerHTML = `<span class="list-jp">${item.j}</span><span class="list-zh">${item.z}</span>`;
            learnDiv.appendChild(card);
        });
        function switchTab(mode) {
            document.getElementById('tab-learn').classList.toggle('active', mode==='learn');
            document.getElementById('tab-quiz').classList.toggle('active', mode==='quiz');
            document.getElementById('learn-content').classList.toggle('active', mode==='learn');
            document.getElementById('quiz-content').classList.toggle('active', mode==='quiz');
            if(mode==='quiz') renderQuestion();
        }
        let currentIdx = 0; let shuffled = [];
        function renderQuestion() {
            if (currentIdx === 0) shuffled = [...wordData].sort(() => Math.random() - 0.5);
            const item = shuffled[currentIdx];
            document.getElementById('q-text').innerText = item.j;
            const box = document.getElementById('options-box'); box.innerHTML = "";
            document.getElementById('result').innerText = "";
            document.getElementById('next-btn').style.display = "none";
            let choices = [item.z];
            while(choices.length < 4) {
                let r = wordData[Math.floor(Math.random() * wordData.length)].z;
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5).forEach(choice => {
                const btn = document.createElement('button');
                btn.className = "opt-btn"; btn.innerText = choice;
                btn.onclick = () => {
                    const res = document.getElementById('result');
                    if (choice === item.z) { res.innerText = "⭕ 正確！"; res.style.color = "green"; }
                    else { res.innerText = "❌ 正確是：" + item.z; res.style.color = "red"; }
                    Array.from(box.children).forEach(b => b.onclick = null);
                    document.getElementById('next-btn').style.display = "block";
                    currentIdx = (currentIdx + 1) % shuffled.length;
                };
                box.appendChild(btn);
            });
        }
    </script>
</body>
</html>
