<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: sans-serif; background: #fff4f8; color: #4a3b44; }
  .header { background: #ff6fa5; color: white; text-align: center; padding: 15px; font-weight: bold; font-size: 18px; }
  .tabs { display: flex; position: sticky; top: 0; z-index: 10; }
  .tab { flex: 1; padding: 12px; border: none; background: #ffd6e8; font-weight: bold; }
  .tab.active { background: #ff6fa5; color: white; }
  .panel { padding: 15px; }
  .hidden { display: none; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .chip { padding: 7px 11px; border-radius: 20px; background: #ffe0ec; border: none; }
  .chip.active { background: #ff6fa5; color: white; }

  .card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .jp { font-size: 18px; font-weight: bold; line-height: 1.7; }
  .zh { color: #ff4f95; line-height: 1.7; margin-top: 4px; }
  .kana { font-size: 13px; color: #888; line-height: 1.7; margin-top: 4px; }
  .section-title { font-weight: bold; color: #ff4f95; margin: 16px 0 10px; font-size: 18px; }

  .option { display: block; width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: 1px solid pink; background: white; }
  .correct { background: #d4ffd4; }
  .wrong { background: #ffd4d4; }

  .btn { margin-top: 10px; padding: 12px; width: 100%; background: #ff6fa5; color: white; border: none; border-radius: 10px; font-weight: bold; }
  .meta { color: #777; font-size: 14px; line-height: 1.7; margin-bottom: 10px; }
</style>
</head>

<div class="header">🌸 Sunny 日文課本完整版</div>

      j: "A：いくらですか。B：200円です。",
      z: "A：多少錢呢？ B：200日圓。",
      k: "A：いくらですか。B：にひゃくえんです。"
    },
    {
      j: "A：これをください。B：はい、どうぞ。",
      z: "A：請給我這個。B：好的，請。",
      k: "A：これをください。B：はい、どうぞ。"
    }
  ]
};

const CATEGORY_NAMES = {
  kana: "50音",
  dakuon: "濁音",
  handakuon: "半濁音",
  youon: "拗音",
  words: "單字",
  places: "地名",
  sentences: "句子",
  dialog: "對話"
};

let previewCategory = "words";
let quizCategory = "words";

function buildChips(containerId, activeKey, onClick) {
  const box = document.getElementById(containerId);
  box.innerHTML = "";
  Object.keys(DATA).forEach(key => {
    const b = document.createElement("button");
    b.className = "chip" + (key === activeKey ? " active" : "");
    b.textContent = CATEGORY_NAMES[key];
    b.onclick = () => onClick(key);
    box.appendChild(b);
  });
}

function renderPreviewChips() {
  buildChips("previewChips", previewCategory, (key) => {
    previewCategory = key;
    renderPreviewChips();
    renderPreview();
  });
}

function renderQuizChips() {
  buildChips("quizChips", quizCategory, (key) => {
    quizCategory = key;
    renderQuizChips();
    document.getElementById("quizMeta").innerHTML = `目前題庫：${CATEGORY_NAMES[quizCategory]}`;
  });
}

function renderPreview() {
  const box = document.getElementById("previewBox");
  box.innerHTML = "";

  const list = DATA[previewCategory];
  list.forEach(item => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerHTML = `
      <div class="jp">${item.j}</div>
      <div class="zh">${item.z}</div>
      ${item.k ? `<div class="kana">50音：${item.k}</div>` : ""}
    `;
    box.appendChild(d);
  });
}

let currentQuestion = null;

function startQuiz() {
  const pool = DATA[quizCategory];
  const item = pool[Math.floor(Math.random() * pool.length)];
  currentQuestion = item;

  const qbox = document.getElementById("qbox");
  const opts = document.getElementById("opts");
  const res = document.getElementById("res");
  const meta = document.getElementById("quizMeta");

  qbox.innerHTML = `<div class="jp">${item.j}</div>`;
  opts.innerHTML = "";
  res.innerHTML = "";
  meta.innerHTML = `目前題庫：${CATEGORY_NAMES[quizCategory]}`;

  const allPool = [...new Set(pool.map(x => x.z))];
  const choices = [item.z];

  while (choices.length < 4 && allPool.length >= 4) {
    const r = allPool[Math.floor(Math.random() * allPool.length)];
    if (!choices.includes(r)) choices.push(r);
  }

  while (choices.length < 4) {
    const fallback = ["不知道", "還沒整理", "再想想", "不確定"][choices.length - 1];
    if (!choices.includes(fallback)) choices.push(fallback);
  }

  choices.sort(() => Math.random() - 0.5);

  choices.forEach(choice => {
    const b = document.createElement("button");
    b.className = "option";
    b.textContent = choice;
    b.onclick = () => {
      document.querySelectorAll(".option").forEach(btn => btn.disabled = true);

      if (choice === item.z) {
        b.classList.add("correct");
        res.innerHTML = `⭕ 正確<br>${item.k ? "50音：" + item.k : ""}`;
      } else {
        b.classList.add("wrong");
        res.innerHTML = `❌ 正解：${item.z}<br>${item.k ? "50音：" + item.k : ""}`;
      }
    };
    opts.appendChild(b);
  });
}

function switchMainTab(e, tab) {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  e.target.classList.add("active");
  document.getElementById("previewPanel").classList.toggle("hidden", tab !== "preview");
  document.getElementById("quizPanel").classList.toggle("hidden", tab !== "quiz");
}

renderPreviewChips();
renderQuizChips();
renderPreview();
document.getElementById("quizMeta").innerHTML = `目前題庫：${CATEGORY_NAMES[quizCategory]}`;
</script>

</body>
</html>
